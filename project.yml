name: AdvancedPrivacyDashboard
options:
  bundleIdPrefix: com.privacydashboard
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic

targets:
  AdvancedPrivacyDashboard:
    type: application
    platform: macOS
    sources:
      - path: AdvancedPrivacyDashboard
        excludes:
          - "Resources/**"
    resources:
      - path: AdvancedPrivacyDashboard/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.privacydashboard.app
        INFOPLIST_FILE: AdvancedPrivacyDashboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: AdvancedPrivacyDashboard/AdvancedPrivacyDashboard.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - target: AdvancedPrivacyDashboardWidget
        embed: true

  AdvancedPrivacyDashboardWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: AdvancedPrivacyDashboardWidget
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.privacydashboard.app.widget
        INFOPLIST_FILE: AdvancedPrivacyDashboardWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: AdvancedPrivacyDashboardWidget/AdvancedPrivacyDashboardWidget.entitlements
        ENABLE_HARDENED_RUNTIME: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        GENERATE_INFOPLIST_FILE: false
        SKIP_INSTALL: true
